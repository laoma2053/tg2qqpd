# ==================================================
# tg2qqpd 统一配置文件
# ==================================================
#
# 修改后重启对应容器即可生效：
#   docker compose restart backend worker
#
# 敏感凭证（API ID / Secret / Token）仍留在 .env 中，
# 由 Docker Compose env_file 注入，本文件通过 ${ENV_VAR} 语法引用。
# ==================================================

# --------------------------------------------------
# Telegram 配置
# --------------------------------------------------
telegram:
  # API 凭证（从 .env 注入，不要直接写明文）
  api_id: ${TG_API_ID}
  api_hash: ${TG_API_HASH}

  # Session 名称（登录态文件名，建议固定不要频繁改）
  session: userbot
  session_dir: /app/sessions

  # 监听来源（支持 @username / t.me 链接 / 数值 ID）
  # 账号必须已加入/可访问
  sources:
    - "@Q_dianshiju"
    - "@Q_dongman"
    - "@Q_dianying"
    - "@Q_jilupian"
    - "@Aliyun_4K_Movies"
    - "@Netdisk_Movies"

# --------------------------------------------------
# QQ 频道 Bot 配置
# --------------------------------------------------
qq:
  # API 凭证（从 .env 注入）
  app_id: ${QQ_APP_ID}
  app_secret: ${QQ_APP_SECRET}
  bot_token: ${QQ_BOT_TOKEN}

  # 手动指定 access_token（留空则自动刷新，推荐留空）
  access_token: ""

  # OpenAPI 地址（一般不需要改）
  api_base: "https://api.sgroup.qq.com"

  # access_token 提前刷新窗口（秒）
  access_token_refresh_skew: 60

  # WS intents（保活默认只订阅最小 GUILDS: 1）
  ws_intents: 1
  ws_log_interval_seconds: 60
  ws_ready_timeout_seconds: 20

  # 目标频道（服务器）guild_id
  target_guild_id: "3628508121088643592"

  # 目标子频道 channel_id（留空则根据 guild_id 自动选择第一个可发言频道）
  target_channel_id: "717979188"

  # 发送最小间隔（秒），防风控
  send_interval: 2

