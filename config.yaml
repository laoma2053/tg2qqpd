  # 静默时段：QQ 频道禁止机器人在 00:00~06:00 发主动消息
  # Worker 在此时段暂停消费队列，消息留在 Redis，时段结束后自动恢复
  quiet_hours_start: 0    # 开始小时（0 = 凌晨0点）
  quiet_hours_end: 6      # 结束小时（6 = 早上6点）

# --------------------------------------------------
# 后台管理 & 鉴权
# --------------------------------------------------
admin:
  # JWT 签名密钥（从 .env 注入）
  jwt_secret: ${JWT_SECRET}
  # 后台管理密码
  admin_pass: ${ADMIN_PASS}
  # JWT 过期时间（秒），默认 7 天
  jwt_expire_seconds: 604800

# --------------------------------------------------
# 转发行为
# --------------------------------------------------
forward:
  # 总开关
  enabled: true
  # 灰度比例：0~1（1=全量转发）
  gray_ratio: 1
  # 发送模板（可选，不需要就留空）
  template_prefix: ""
  template_suffix: ""

# --------------------------------------------------
# 过滤规则（黑名单优先 + 可选白名单）
# --------------------------------------------------
rules:
  filter:
    # 黑名单关键词（命中即丢弃，最高优先级）
    block_keywords:
      - "抽奖"
      - "注册"
      - "娱乐"
      - "新会员"
      - "搜索"
    # 黑名单正则
    block_regex:
      - "(?i)telegram\\.me/"
      - "(?i)t\\.me/"
    # 白名单关键词
    allow_keywords:
      - "4K"
    # 白名单正则
    allow_regex: []
    # 是否必须命中白名单才转发（true=只转发含白名单关键词的；false=黑名单没命中就放行）
    require_allows: false

  # ------------------------------------------------
  # 文案清洗规则（从上到下依次执行）
  # ------------------------------------------------
  # 支持类型：
  #   regex_replace — 正则替换（pattern → repl）
  #   append        — 追加固定文本到末尾
  #
  # 正则说明：
  #   使用 Python re 语法
  #   flags 可选：s(DOTALL) m(MULTILINE) i(IGNORECASE)，默认 "ms"
  #   repl 为空字符串 "" 表示删除匹配内容
  #
  # 执行完所有规则后，内置做"多空行收敛"和"首尾去空白"。
  # ------------------------------------------------
  transforms:

    # (1) 将"名称："替换为"🎬已更新："
    - type: regex_replace
      pattern: "^名称[:：]\\s*"
      repl: "🎬已更新："
      flags: "m"

    # (2) 去除 Markdown 加粗标记 **
    - type: regex_replace
      pattern: "\\*\\*"
      repl: ""

    # (3) 删除"链接：https://..."行
    - type: regex_replace
      pattern: "(?m)^链接[:：]\\s*https?://\\S+\\s*$"
      repl: ""

    # (4) 删除"阿里：https://..."行
    - type: regex_replace
      pattern: "(?m)^阿里[:：]\\s*https?://\\S+\\s*$"
      repl: ""

    # (5) 删除"夸克：https://..."行
    - type: regex_replace
      pattern: "(?m)^夸克[:：]\\s*https?://\\S+\\s*$"
      repl: ""

    # (6) 删除"百度：https://..."行
    - type: regex_replace
      pattern: "(?m)^百度[:：]\\s*https?://\\S+\\s*$"
      repl: ""

    # (7) 删除"📁 大小：..."行
    - type: regex_replace
      pattern: "(?m)^📁\\s*大小[:：].*$"
      repl: ""

    # (8) 删除"🏷 标签：..."行
    - type: regex_replace
      pattern: "(?m)^🏷\\s*标签[:：].*$"
      repl: ""

    # (9) 删除"🗂 信息"块（包含体积/标签等），直到下一个大段落或文本结束
    - type: regex_replace
      pattern: "(?ms)^🗂\\s*信息[:：]?\\s*$(?:\\n.*?)*?(?=^📝\\s*内容简介|^🍟|^📤|\\Z)"
      repl: ""

    # (10) 删除投稿/频道/群组/广告合作等尾部导流信息
    - type: regex_replace
      pattern: "(?s)🍟\\s*投稿人[：:].*$"
      repl: ""

    # (11) 删除原文自带的"📤 资源链接：..."提示行
    - type: regex_replace
      pattern: "(?m)^📤\\s*资源链接[:：].*$"
      repl: ""

    # (12) 删除所有剩余的 http/https 链接（QQ 频道禁止外部 URL）
    - type: regex_replace
      pattern: "https?://[^\\s]+"
      repl: ""
      flags: "i"

    # (13) 追加资源说明模板
    - type: append
      text: |
        📤 资源链接：
        加入QQ群963115963搜资源
        夸克网盘:https://pan.quark.cn/s/31b3479e3209
        百度网盘:https://pan.baidu.com/s/1d2kpf_PogQXfkomoqmrxeg?pwd=zhui 
        UC网盘:https://drive.uc.cn/s/79521dbef0864?public=1
        迅雷网盘:https://pan.xunlei.com/s/VOmmtFDZ2Dx1N67g9kI95SW3A1?pwd=sbqq

# --------------------------------------------------
# 日志
# --------------------------------------------------
logging:
  # 日志等级：目前仅用于控制 debug 输出
  level: INFO
  # 是否打印 TG 事件调试日志（收到消息、过滤原因、入队/丢弃详情）
  debug_tg_events: true
